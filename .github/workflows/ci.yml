name: CI — Validate, Lint & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── Backend ───────────────────────────────────────────────
  backend-lint-test:
    name: Backend · Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy

      - name: Lint with Ruff
        run: ruff check app/ --select E,F,W,I

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # non-blocking for now

  backend-docker-build:
    name: Backend · Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: sales-insight-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Frontend ───────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend · Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.rabbittai.com
          VITE_API_KEY: ci-placeholder-key

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  frontend-docker-build:
    name: Frontend · Docker Build
    runs-on: ubuntu-latest
    needs: frontend-lint-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: sales-insight-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Summary ────────────────────────────────────────────────
  ci-summary:
    name: CI Complete
    runs-on: ubuntu-latest
    needs: [backend-docker-build, frontend-docker-build]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "✅ Backend lint: ${{ needs.backend-lint-test.result }}"
          echo "✅ Backend Docker build: ${{ needs.backend-docker-build.result }}"
          echo "✅ Frontend lint+build: ${{ needs.frontend-lint-build.result }}"
          echo "✅ Frontend Docker build: ${{ needs.frontend-docker-build.result }}"
